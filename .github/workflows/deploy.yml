name: CI/CD — Azure Container Apps Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP: ${{ secrets.AZURE_CONTAINER_APP }}
  ACR_SERVER: ${{ secrets.AZURE_REGISTRY }}
  IMAGE_NAME: crux-backend/api

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Log in to Azure via OIDC ──────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 3. Log in to ACR ─────────────────────────────────────
      - name: ACR login
        run: |
          az acr login --name $(echo $ACR_SERVER | cut -d. -f1)

      # ── 4. Build Docker image ────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ACR_SERVER/$IMAGE_NAME:latest \
            -t $ACR_SERVER/$IMAGE_NAME:${{ github.sha }} \
            .

      # ── 5. Push to ACR ───────────────────────────────────────
      - name: Push to ACR
        run: |
          docker push $ACR_SERVER/$IMAGE_NAME:latest
          docker push $ACR_SERVER/$IMAGE_NAME:${{ github.sha }}

      # ── 6. Configure ACR pull access ─────────────────────────
      - name: Configure Container App ACR access
        run: |
          ACR_USERNAME=$(az acr credential show \
            --name $(echo $ACR_SERVER | cut -d. -f1) \
            --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show \
            --name $(echo $ACR_SERVER | cut -d. -f1) \
            --query "passwords[0].value" -o tsv)

          az containerapp registry set \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_APP \
            --server $ACR_SERVER \
            --username "$ACR_USERNAME" \
            --password "$ACR_PASSWORD"

      # ── 7. Deploy to Azure Container Apps ────────────────────
      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP }}
          imageToDeploy: ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          targetPort: 8080
          ingress: external

      # ── 8. Health check ──────────────────────────────────────
      - name: Health check
        run: |
          FQDN=$(az containerapp show \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_APP \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "Service URL: https://$FQDN"

          for i in 1 2 3 4 5; do
            echo "Health check attempt $i..."
            if curl --fail --silent --max-time 15 "https://$FQDN/health"; then
              echo ""
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1

      # ── 9. Job summary ───────────────────────────────────────
      - name: Post deployment summary
        run: |
          FQDN=$(az containerapp show \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_APP \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "## ■ Deployment Summary (Azure)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | \`${{ env.CONTAINER_APP }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image SHA** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Service URL** | https://$FQDN |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health** | [https://$FQDN/health](https://$FQDN/health) |" >> $GITHUB_STEP_SUMMARY