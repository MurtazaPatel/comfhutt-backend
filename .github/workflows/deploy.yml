name: CI/CD — Cloud Run Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: comfhutt-backend
  REGION: asia-south1
  SERVICE_NAME: comfhutt-backend
  REGISTRY: asia-south1-docker.pkg.dev
  IMAGE: asia-south1-docker.pkg.dev/comfhutt-backend/comfhutt-backend/api

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ──────────────────────────────────
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker for Artifact Registry ─────────────
      - name: Configure Docker credential helper
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Build Docker image (linux/amd64 for Cloud Run) ─────
      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            .

      # ── 6. Push both tags to Artifact Registry ────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      # ── 7. Deploy to Cloud Run (SHA tag for traceability) ─────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --quiet

      # ── 8. Health check after deploy ──────────────────────────
      - name: Health check
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --format='value(status.url)')

          echo "Service URL: $SERVICE_URL"

          # Retry up to 5 times with 10s between attempts (Cloud Run cold start)
          for i in 1 2 3 4 5; do
            echo "Health check attempt $i..."
            if curl --fail --silent --max-time 15 "$SERVICE_URL/health"; then
              echo ""
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1

      # ── 9. Job summary ────────────────────────────────────────
      - name: Post deployment summary
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --format='value(status.url)')

          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | \`${{ env.SERVICE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image SHA** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Service URL** | $SERVICE_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health** | [$SERVICE_URL/health]($SERVICE_URL/health) |" >> $GITHUB_STEP_SUMMARY
